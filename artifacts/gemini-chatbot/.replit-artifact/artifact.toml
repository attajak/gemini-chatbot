kind = "web"
previewPath = "/"
title = "Gemini Chatbot"
version = "1.0.0"
id = "artifacts/gemini-chatbot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20136

[services.development]
run = "pnpm --filter @workspace/gemini-chatbot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gemini-chatbot", "run", "build" ]
publicDir = "artifacts/gemini-chatbot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20136"
BASE_PATH = "/"
